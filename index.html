<style>

    font-family: -apple-system, BlinkMacSystemFont, 'Apple SD Gothic Neo', 'Noto Sans KR', 'Malgun Gothic', sans-serif;

    display: flex;
    align-items: center;
    justify-content: center;

    background: #fff;
    border: 1.5px solid #d1cfc5;
    border-radius: 16px;
    padding: 48px 44px 40px;

    max-width: 400px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.08);

    width: 48px; height: 48px;

    border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    margin-bottom: 20px;
    font-size: 22px;

    font-size: 20px; font-weight: 700; color: #1a1a18;
    margin-bottom: 6px;
  }
  .login-sub {
    font-size: 13px; color: #6b6b67;
    margin-bottom: 32px; line-height: 1.5;
  }
  label {
    display: block; font-size: 12px; font-weight: 600;
    color: #4a4a47; margin-bottom: 7px;
  }
  .input-wrap { position: relative; margin-bottom: 10px; }
  input[type="password"] {
    width: 100%; padding: 11px 44px 11px 14px;

    font-size: 14px; color: #1a1a18; background: #fafaf8;

    font-family: inherit;

  input[type="password"]:focus { border-color: #1e2d40; background: #fff; }
  .toggle-pw {
    position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
    background: none; border: none; cursor: pointer; color: #9b9b96;
    font-size: 16px; padding: 0; line-height: 1;
  }
  .error-msg {
    font-size: 12px; color: #c0392b;
    background: #fff5f5; border: 1px solid #fca5a5;
    border-radius: 6px; padding: 8px 12px;
    margin-bottom: 14px; display: none;
  }
  .error-msg.show { display: block; }
  .btn-login {
    width: 100%; padding: 13px;
    background: #1e2d40; color: #fff;
    border: none; border-radius: 8px;
    font-size: 14px; font-weight: 600;
    cursor: pointer; font-family: inherit;
    transition: background .15s;
    margin-top: 6px;
  }
  .btn-login:hover { background: #2c3e55; }
  .btn-login:active { background: #141e2b; }
  .footer-note {
    margin-top: 24px; font-size: 11px; color: #9b9b96;
    text-align: center; line-height: 1.6;
    border-top: 1px solid #e8e7e2; padding-top: 16px;
  }

<body>
<div class="login-wrap">
  <div class="login-icon">🏫</div>
  <div class="login-title">기숙학원 등기부 대시보드</div>
  <div class="login-sub">열람 권한이 있는 사용자만 접근 가능합니다.<br>비밀번호를 입력해 주세요.</div>

  <label for="pw">비밀번호</label>
  <div class="input-wrap">
    <input type="password" id="pw" placeholder="비밀번호 입력"
      onkeydown="if(event.key==='Enter') doLogin()" autofocus>
    <button class="toggle-pw" onclick="togglePw()" type="button" id="eyeBtn">👁</button>
  </div>
  <div class="error-msg" id="errMsg">비밀번호가 올바르지 않습니다.</div>
  <button class="btn-login" onclick="doLogin()">접속하기</button>

  <div class="footer-note">
    5개 학원 · 14건 등기부 분석<br>
    열람용 자료 — 법적 효력 없음
  </div>
</div>

<script>
function doLogin() {
  var pw = document.getElementById('pw').value;
  var err = document.getElementById('errMsg');
  if (pw === 'etoossuper') {
    sessionStorage.setItem('auth', 'ok');
    document.body.innerHTML = getDashboard();
    initDash();
  } else {
    err.classList.add('show');
    document.getElementById('pw').value = '';
    document.getElementById('pw').focus();
  }
}
function togglePw() {
  var inp = document.getElementById('pw');
  inp.type = inp.type === 'password' ? 'text' : 'password';
}
function initDash() {
  // 상세 패널 토글 기능 복원
  window.openState = {};
  window.toggle = function(id) {
    var panel = document.getElementById('detail-' + id);
    var card  = document.getElementById('card-' + id);
    if (!panel) return;
    if (openState[id]) {
      panel.classList.remove('open');
      if (card) card.classList.remove('active');
      openState[id] = false;
    } else {
      panel.classList.add('open');
      if (card) card.classList.add('active');
      openState[id] = true;
      setTimeout(function(){ panel.scrollIntoView({ behavior:'smooth', block:'nearest' }); }, 80);
    }
  };
}
function getDashboard() {

<script>
var openState = {};
function toggle(id) {
  var panel = document.getElementById('detail-' + id);
  var card  = document.getElementById('card-' + id);
  if (!panel) return;
  if (openState[id]) {
    panel.classList.remove('open');
    if (card) card.classList.remove('active');
    openState[id] = false;
  } else {
    panel.classList.add('open');
    if (card) card.classList.add('active');
    openState[id] = true;
    setTimeout(function(){ panel.scrollIntoView({ behavior:'smooth', block:'nearest' }); }, 80);
  }
}
</script>
